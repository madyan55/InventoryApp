package com.madyan.inventory.ui;

import android.content.Intent;
import android.os.Bundle;
import android.widget.Button;

import androidx.appcompat.app.AppCompatActivity;

import com.madyan.inventory.R;

public class MainActivity extends AppCompatActivity {

    private Button btnDashboard;
    private Button btnProducts;
    private Button btnWarehouses;
    private Button btnInventory;
    private Button btnReports;

    @Override
    protected void onCreate(Bundle savedInstanceState) {
        super.onCreate(savedInstanceState);
        setContentView(R.layout.activity_main); // واجهة البداية

        // ربط الأزرار من واجهة XML
        btnDashboard  = findViewById(R.id.btnDashboard);
        btnProducts   = findViewById(R.id.btnProducts);
        btnWarehouses = findViewById(R.id.btnWarehouses);
        btnInventory  = findViewById(R.id.btnInventory);
        btnReports    = findViewById(R.id.btnReports);

        // 🔹 فتح لوحة التحكم
        btnDashboard.setOnClickListener(v -> {
            Intent intent = new Intent(MainActivity.this, DashboardActivity.class);
            startActivity(intent);
        });

