name: Android CI/CD

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 1️⃣ جلب الكود من المستودع
      - name: Checkout code
        uses: actions/checkout@v3

      # 2️⃣ إعداد JDK
      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'

      # 3️⃣ إعداد Gradle
      - name: Setup Gradle
        uses: gradle/gradle-build-action@v2

      # 4️⃣ بناء نسخة Debug APK
      - name: Build Debug APK
        run: ./gradlew assembleDebug

      # 5️⃣ رفع الـ APK كـ Artifact
      - name: Upload APK
        uses: actions/upload-artifact@v3
        with:
          name: InventoryApp-Debug
          path: app/build/outputs/apk/debug/*.apk
